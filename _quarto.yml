project:
  type: book

book:
  title: "GEOMETRY and the Art of Design"
  subtitle: "An introduction to Geometry for non-majors"
  author: "Jennifer Shloming"
  date: "April 16, 2026"
  chapters:
    - index.qmd
    - chapters/01-language-of-geometry.qmd
    - chapters/02-star-polygons.qmd
    - chapters/03-sequences.qmd
    - chapters/04-figurate-numbers-fibs-and-sums.qmd
    - chapters/05-polygons-and-polyhedra.qmd
    - chapters/06-tessellations-and-fractals.qmd
    - chapters/07-symmetry-isometries-and-frieze-patterns.qmd
    - chapters/08-conic-sections.qmd
    - chapters/09-proof-strategies.qmd
    - references.qmd
  appendices:
    - chapters/appendix-a-formulas.qmd
    - chapters/appendix-c-solutions-to-practice.qmd
    - chapters/appendix-b-solutions-to-more-exercises.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    number-sections: true
    include-after-body: numbering-offset.html
  pdf:
    documentclass: scrreprt
  epub:
    cover-image: bookcover/bookcover(2).png

execute:
  freeze: auto

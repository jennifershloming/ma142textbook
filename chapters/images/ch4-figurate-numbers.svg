    <circle cx="390" cy="188" r="10"/><circle cx="440" cy="188" r="10"/><circle cx="490" cy="188" r="10"/><circle cx="540" cy="188" r="10"/>
    <circle cx="390" cy="238" r="10"/><circle cx="440" cy="238" r="10"/><circle cx="490" cy="238" r="10"/><circle cx="540" cy="238" r="10"/>

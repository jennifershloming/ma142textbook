    <circle cx="140" cy="78" r="10"/>
    <circle cx="115" cy="118" r="10"/><circle cx="165" cy="118" r="10"/>
    <circle cx="90" cy="158" r="10"/><circle cx="140" cy="158" r="10"/><circle cx="190" cy="158" r="10"/>
    <circle cx="65" cy="198" r="10"/><circle cx="115" cy="198" r="10"/><circle cx="165" cy="198" r="10"/><circle cx="215" cy="198" r="10"/>
  </g>


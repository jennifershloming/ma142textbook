<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" role="img" aria-labelledby="title desc">
  <title id="title">Figurate Number Patterns</title>
  <desc id="desc">Dot diagrams for triangular, square, and pentagonal figurate numbers.</desc>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="75" y="35" font-size="18" fill="#334155">Triangular</text>
  <text x="280" y="35" font-size="18" fill="#334155">Square</text>
  <text x="490" y="35" font-size="18" fill="#334155">Pentagonal</text>

  <g fill="#0f766e">
    <circle cx="90" cy="70" r="6"/>
    <circle cx="75" cy="100" r="6"/><circle cx="105" cy="100" r="6"/>
    <circle cx="60" cy="130" r="6"/><circle cx="90" cy="130" r="6"/><circle cx="120" cy="130" r="6"/>
    <circle cx="45" cy="160" r="6"/><circle cx="75" cy="160" r="6"/><circle cx="105" cy="160" r="6"/><circle cx="135" cy="160" r="6"/>
  </g>

  <g fill="#1d4ed8">
    <circle cx="270" cy="70" r="6"/><circle cx="300" cy="70" r="6"/><circle cx="330" cy="70" r="6"/>
    <circle cx="270" cy="100" r="6"/><circle cx="300" cy="100" r="6"/><circle cx="330" cy="100" r="6"/>
    <circle cx="270" cy="130" r="6"/><circle cx="300" cy="130" r="6"/><circle cx="330" cy="130" r="6"/>
  </g>

  <g fill="#9333ea">
    <circle cx="500" cy="70" r="6"/><circle cx="530" cy="80" r="6"/><circle cx="545" cy="108" r="6"/>
    <circle cx="535" cy="138" r="6"/><circle cx="510" cy="156" r="6"/><circle cx="480" cy="156" r="6"/>
    <circle cx="455" cy="138" r="6"/><circle cx="445" cy="108" r="6"/><circle cx="462" cy="80" r="6"/>
  </g>
</svg>

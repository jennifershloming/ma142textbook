<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480" role="img" aria-labelledby="title desc">
  <title id="title">Star Polygon {5/2}</title>
  <desc id="desc">A pentagram drawn by connecting every second vertex on a five-point circle.</desc>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <circle cx="240" cy="240" r="180" fill="none" stroke="#d9d9d9" stroke-width="2"/>

  <polygon
    points="240,60 68.81,184.38 134.20,385.62 345.80,385.62 411.19,184.38"
    fill="none"
    stroke="#1f2937"
    stroke-width="8"
    stroke-linejoin="round"/>

  <polyline
    points="240,60 134.20,385.62 411.19,184.38 68.81,184.38 345.80,385.62 240,60"
    fill="none"
    stroke="#0f766e"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <g fill="#0f766e">
    <circle cx="240" cy="60" r="7"/>
    <circle cx="68.81" cy="184.38" r="7"/>
    <circle cx="134.20" cy="385.62" r="7"/>
    <circle cx="345.80" cy="385.62" r="7"/>
    <circle cx="411.19" cy="184.38" r="7"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Conic Sections</title>
  <desc id="desc">Circle, ellipse, parabola, and hyperbola curves shown side by side.</desc>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <g transform="translate(80,95)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#0f766e" stroke-width="4"/>
    <text x="-25" y="75" font-size="16" fill="#334155">Circle</text>
  </g>

  <g transform="translate(240,95)">
    <ellipse cx="0" cy="0" rx="60" ry="38" fill="none" stroke="#1d4ed8" stroke-width="4"/>
    <text x="-25" y="75" font-size="16" fill="#334155">Ellipse</text>
  </g>

  <g transform="translate(400,50)">
    <path d="M -55 120 Q 0 10 55 120" fill="none" stroke="#9333ea" stroke-width="4"/>
    <text x="-30" y="160" font-size="16" fill="#334155">Parabola</text>
  </g>

  <g transform="translate(540,95)">
    <path d="M -50 -40 C -10 -20 -10 20 -50 40" fill="none" stroke="#ea580c" stroke-width="4"/>
    <path d="M 50 -40 C 10 -20 10 20 50 40" fill="none" stroke="#ea580c" stroke-width="4"/>
    <text x="-42" y="75" font-size="16" fill="#334155">Hyperbola</text>
  </g>
</svg>

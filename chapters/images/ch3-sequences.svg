<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">Sequence Text Example</title>
  <desc id="desc">Large text reading 2, 4, 6, 8, dot dot dot, who do we appreciate.</desc>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="360" y="110" text-anchor="middle" font-size="56" fill="#0f766e" font-family="Georgia, serif" font-weight="bold">2, 4, 6, 8, ...</text>
  <text x="360" y="190" text-anchor="middle" font-size="42" fill="#1d4ed8" font-family="Georgia, serif">who do we appreciate?!</text>
</svg>
